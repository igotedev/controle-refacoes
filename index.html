<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fila de Correções</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
margin-top:5px;
margin-bottom:10px;
padding:8px;
}

button{
padding:8px 12px;
border:none;
background:#4CAF50;
color:white;
cursor:pointer;
border-radius:5px;
margin-right:5px;
}

button:hover{
opacity:0.9;
}

.board{
display:flex;
gap:20px;
}

.column{
flex:1;
background:#e9e9e9;
padding:10px;
border-radius:10px;
min-height:300px;
}

.card{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card small{
display:block;
margin-top:5px;
color:#555;
}

.move{
margin-top:8px;
}

</style>
</head>

<body>

<h1>Fila de Correções</h1>

<div class="form">

<label>Texto + Links das correções</label>
<textarea id="texto"></textarea>

<label>Data de entrega</label>
<input type="date" id="data">

<button onclick="criarCard()">Criar Card</button>

</div>

<div class="board">

<div class="column">
<h3>Fila</h3>
<div id="fila"></div>
</div>

<div class="column">
<h3>Em andamento</h3>
<div id="andamento"></div>
</div>

<div class="column">
<h3>Concluído</h3>
<div id="feito"></div>
</div>

</div>

<script>

function criarCard(){

let texto = document.getElementById("texto").value
let data = document.getElementById("data").value

let card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<b>Correção</b>
<p>${texto}</p>
<small>Entrega: ${data}</small>

<div class="move">
<button onclick="mover(this,'andamento')">▶ Em andamento</button>
<button onclick="mover(this,'feito')">✔ Concluído</button>
<button onclick="excluir(this)">🗑 Excluir</button>
</div>
`

document.getElementById("fila").appendChild(card)

document.getElementById("texto").value=""
document.getElementById("data").value=""

}

function mover(btn,coluna){

let card = btn.closest(".card")
document.getElementById(coluna).appendChild(card)

}

function excluir(btn){

let card = btn.closest(".card")
card.remove()

}

</script>

</body>
</html>
```
